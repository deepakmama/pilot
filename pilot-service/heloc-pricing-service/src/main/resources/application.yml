server:
  port: ${PORT:8092}

spring:
  aop:
    auto: true
    proxy-target-class: true

rule:
  file-path: ${RULE_FILE_PATH:rules/heloc-pricing-rules.xls}
  template-class: me.anichakra.poc.pilot.heloc.pricing.rule.HelocPricingRuleTemplate
  engine: OPENL_TABLETS_ORG

instrumentation:
  name: heloc-pricing-service
  version: 1.0
  environment: DEV
  remote-address-header: X-Forwarded-For
  user-header: X-USER
  enabled: true
  instance-id: 11
  start-time: 14-Mar-2026
  ignore-duration-in-millis: 20
  handlers:
    log:
      layers:
      - FILTER
      - CONTROLLER
      - SERVICE
      - REPOSITORY
      event-names: all
      ignore-parameters: false
      ignore-outcome: true
      ignore-exception-stack: false
      limited: false
    new-relic:
      event-names: none
    aws-sns:
      event-names: sourcing
    tracing:
      event-names: tracing
      metrics:
      - NAME
      - VERSION
      - INSTANCE_ID
      - TRACE_ID
      - ENVIRONMENT
      - CORRELATION_ID
      - USER_ID
      - LOCAL_ADDRESS
      - REMOTE_ADDRESS
      - URI
